[variables]
PHP_VERSION = "8.4"
NODE_VERSION = "20"

[phases.install]
cmds = [
  "composer install --no-dev --no-interaction --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"