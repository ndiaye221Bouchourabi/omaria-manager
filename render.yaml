services:
  - type: web
    name: omaria-manager
    env: php
    buildCommand: composer install --no-dev && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
php artisan migrate --force && php-fpm